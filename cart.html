<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Healthytummy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            background-color: var(--light-green);
            padding: 40px 0;
            text-align: center;
            margin-bottom: 40px;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .cart-items {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-light);
        }

        .cart-table td {
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cart-item-title {
            font-weight: 600;
            color: var(--dark-green);
        }

        .btn-remove {
            color: #e74c3c;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .btn-remove:hover {
            color: #c0392b;
            transform: scale(1.1);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            background: var(--light-green);
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--dark-green);
            font-weight: bold;
        }

        .cart-summary {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 30px;
            height: fit-content;
        }

        .cart-summary h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .summary-total {
            border-top: 2px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--dark-green);
        }

        .btn-checkout {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
        }

        .empty-cart i {
            font-size: 4rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
            .cart-table thead {
                display: none;
            }
            .cart-table, .cart-table tbody, .cart-table tr, .cart-table td {
                display: block;
                width: 100%;
            }
            .cart-table tr {
                margin-bottom: 20px;
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 10px;
            }
            .cart-table td {
                text-align: right;
                padding: 10px;
                border: none;
                position: relative;
            }
            .cart-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                padding-right: 10px;
                text-align: left;
                font-weight: bold;
            }
            .cart-item-info {
                justify-content: flex-end;
            }
            .qty-controls {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<!-- 🌹 Rose Chatbot -->
<div id="rose-chatbot">
  <div id="rose-toggle">🌹</div>

  <div id="rose-box">
    <div id="rose-header">
      Rose Assistant 🌹
      <span onclick="toggleChat()">✖</span>
    </div>

    <div id="rose-body"></div>
  </div>
</div>

<link rel="stylesheet" href="css/rose.css">
<script src="js/rose.js"></script>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" ondblclick="goToAdmin()">
                <i class="fa-solid fa-leaf"></i> Healthy<span>tummy</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
            </ul>

            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count" id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Your Shopping Cart</h1>
        </div>
    </div>

    <div class="container cart-container" id="cart-view">
        <!-- Cart content injected by JS -->
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCartPage);

        function renderCartPage() {
            const container = document.getElementById('cart-view');
            const cart = getCart();

            if (cart.length === 0) {
                container.style.gridTemplateColumns = '1fr';
                container.innerHTML = `
                    <div class="empty-cart cart-items">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <h2>Your cart is empty</h2>
                        <p style="margin: 20px 0;">Looks like you haven't added any healthy treats yet.</p>
                        <a href="products.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            // Calculate totals
            let subtotal = 0;
            const itemsHtml = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <tr>
                        <td data-label="Product">
                            <div class="cart-item-info">
                                <div class="cart-item-img">
                                   <img src="${item.image}" alt="${item.name}">
                                </div>
                                <span class="cart-item-title">${item.name}</span>
                            </div>
                        </td>
                        <td data-label="Price">₹${item.price}</td>
                        <td data-label="Quantity">
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateCartItemQty(${index}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateCartItemQty(${index}, 1)">+</button>
                            </div>
                        </td>
                        <td data-label="Total">₹${itemTotal}</td>
                        <td data-label="Remove">
                            <button class="btn-remove" onclick="removeCartItem(${index})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            const shipping = subtotal > 500 ? 0 : 50;
            const total = subtotal + shipping;

            container.innerHTML = `
                <div class="cart-items">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>
                </div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹${subtotal}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shipping === 0 ? 'Free' : '₹' + shipping}</span>
                    </div>
                    ${shipping > 0 ? `<p style="font-size:0.85rem; color:var(--text-light); text-align:right;">Free shipping on orders over ₹500</p>` : ''}
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>₹${total}</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary btn-checkout">Proceed to Checkout</a>
                </div>
            `;
        }

        function updateCartItemQty(index, change) {
            const cart = getCart();
            if (cart[index].quantity + change > 0) {
                cart[index].quantity += change;
                saveCart(cart);
                renderCartPage();
            }
        }

        function removeCartItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCartPage();
        }
    </script>
</body>
</html>
