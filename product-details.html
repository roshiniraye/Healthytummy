<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Healthytummy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-details-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin: 60px auto;
            align-items: start;
        }

        .pd-image {
            background-color: var(--white);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .pd-image img {
            width: 80%;
            max-width: 400px;
            transition: transform 0.3s;
        }

        .pd-image img:hover {
            transform: scale(1.05);
        }

        .pd-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .pd-category {
            color: var(--rust-orange);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .pd-price {
            font-size: 2rem;
            color: var(--dark-green);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .pd-desc {
            font-size: 1.1rem;
            color: var(--text-dark);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .pd-benefits {
            background-color: var(--light-green);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .pd-benefits h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .pd-benefits ul {
            list-style: none;
            padding-left: 0;
        }

        .pd-benefits li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 10px;
        }

        .pd-benefits li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--primary-green);
            font-weight: bold;
        }

        .pd-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            overflow: hidden;
            background: var(--white);
        }

        .qty-btn {
            background: transparent;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        .qty-btn:hover {
            background: #f0f0f0;
        }

        .qty-input {
            width: 50px;
            text-align: center;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .qty-input:focus {
            outline: none;
        }

        .btn-large {
            padding: 15px 40px;
            font-size: 1.2rem;
            flex-grow: 1;
        }

        @media (max-width: 768px) {
            .product-details-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<!-- 🌹 Rose Chatbot -->
<div id="rose-chatbot">
  <div id="rose-toggle">🌹</div>

  <div id="rose-box">
    <div id="rose-header">
      Rose Assistant 🌹
      <span onclick="toggleChat()">✖</span>
    </div>

    <div id="rose-body"></div>
  </div>
</div>

<link rel="stylesheet" href="css/rose.css">
<script src="js/rose.js"></script>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" ondblclick="goToAdmin()">
                <i class="fa-solid fa-leaf"></i> Healthy<span>tummy</span>
            </a>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
            </ul>

            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count" id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container product-details-container" id="pd-container">
        <!-- Details will be loaded here -->
        <p>Loading product details...</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Healthytummy. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('pd-container');
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            if (!productId) {
                container.innerHTML = '<p>Product not found.</p><a href="products.html" class="btn btn-primary">Go to Products</a>';
                return;
            }

            try {
                const products = await fetchProducts();
                const product = products.find(p => p.id === productId);

                if (!product) throw new Error('Product not found');
                // Generate benefits HTML
                const benefitsHtml = product.benefits.map(b => `<li>${b}</li>`).join('');

                container.innerHTML = `
                    <div class="pd-image">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="pd-info">
                        <div class="pd-category">${product.category}</div>
                        <h1>${product.name}</h1>
                        <div class="pd-price">₹${product.price}</div>
                        
                        <p class="pd-desc">${product.description}</p>
                        
                        <div class="pd-benefits">
                            <h3>Key Health Benefits</h3>
                            <ul>
                                ${benefitsHtml}
                            </ul>
                        </div>

                        <div class="pd-actions">
                            <div class="quantity-control">
                                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                                <input type="number" id="pd-qty" class="qty-input" value="1" min="1" readonly>
                                <button class="qty-btn" onclick="updateQty(1)">+</button>
                            </div>
                            <button onclick="addCurrentToCart(${product.id})" class="btn btn-primary btn-large">Add to Cart</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<p>Error loading product.</p><a href="products.html" class="btn btn-primary">Back to Shop</a>';
            }
        });

        function updateQty(change) {
            const input = document.getElementById('pd-qty');
            let current = parseInt(input.value);
            if (current + change >= 1) {
                input.value = current + change;
            }
        }

        async function addCurrentToCart(productId) {
            const qty = parseInt(document.getElementById('pd-qty').value);
            const products = await fetchProducts();
            const product = products.find(p => p.id === productId);
            
            if (!product) return;

            const cart = getCart();
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    quantity: qty
                });
            }

            saveCart(cart);
            alert(`${qty} x ${product.name} added to cart!`);
        }
    </script>
</body>
</html>
