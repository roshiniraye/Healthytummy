<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2 style="text-align:center;">Admin Dashboard</h2>

<div style="text-align:center; margin:20px;">
    <input type="date" id="filter-date">
    <input type="month" id="filter-month">
    <button onclick="filterOrders()">Filter</button>
</div>

<div id="orders"></div>

<script>
if(localStorage.getItem("isAdmin") !== "true") {
    window.location.href = "admin.html";
}

// Load orders initially
document.addEventListener("DOMContentLoaded", () => {
    const orders = JSON.parse(localStorage.getItem('healthytummy_orders')) || [];
    loadOrders(orders);
});

function loadOrders(data) {
    const container = document.getElementById('orders');

    if(data.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>No orders found</p>";
        return;
    }

    container.innerHTML = data.map(order => `
        <div style="border:1px solid #ccc; padding:15px; margin:10px;">
            <p><b>Order ID:</b> ${order.id}</p>
            <p><b>Date:</b> ${new Date(order.date).toLocaleDateString()}</p>
            <p><b>Total:</b> ₹${order.total}</p>
            <p><b>Payment:</b> ${order.payment}</p>

            <hr>

            <p><b>Customer Name:</b> ${order.customer?.name || 'N/A'}</p>
            <p><b>Phone:</b> ${order.customer?.phone || 'N/A'}</p>
            <p><b>Address:</b> ${order.customer?.address || 'N/A'}</p>
            <p><b>City:</b> ${order.customer?.city || 'N/A'}</p>
        </div>
    `).join('');
}

function filterOrders() {
    const orders = JSON.parse(localStorage.getItem('healthytummy_orders')) || [];

    const selectedDate = document.getElementById('filter-date').value;
    const selectedMonth = document.getElementById('filter-month').value;

    let filtered = orders.filter(order => {
        const d = new Date(order.date);

        // LOCAL date (important fix)
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');

        const orderDate = `${year}-${month}-${day}`;
        const orderMonth = `${year}-${month}`;

        return (
            (!selectedDate || orderDate === selectedDate) &&
            (!selectedMonth || orderMonth === selectedMonth)
        );
    });

    loadOrders(filtered); // ✅ correct function
}
</script>

</body>
</html>
